<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Philippine BIR compliance tracking for CPAs and bookkeepers">
<title>The Present Value — Practitioner Suite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
:root {
  /* Brand */
  --royal:  #4169e1;
  --rs:     rgba(65,105,225,.07);
  --rm:     rgba(65,105,225,.14);
  --navy:   #2c3e50;

  /* Semantic colours */
  --green:  #2d8a4e;
  --gs:     rgba(45,138,78,.07);
  --gm:     rgba(45,138,78,.14);
  --amber:  #d4850a;
  --as:     rgba(212,133,10,.07);
  --am:     rgba(212,133,10,.14);
  --red:    #c0392b;
  --rds:    rgba(192,57,43,.07);
  --rdm:    rgba(192,57,43,.14);

  /* Neutrals */
  --bg:   #f9f9fa;
  --sf:   #fff;
  --s2:   #f0f1f3;
  --s3:   #e8e9ec;
  --bd:   #e0e2e6;
  --bl:   #b5b8bd;
  --ink:  #111;
  --ch:   #333;
  --dim:  #595959;
  --mu:   #707070;
  --lt:   #9a9a9a;

  /* Shape */
  --r:    8px;
  --rr:   5px;

  /* Shadow */
  --sh:   0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.06);
  --shs:  0 1px 2px rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.04);

  /* Typography */
  --se: 'Source Serif 4', Georgia, serif;
  --sa: 'Inter', system-ui, sans-serif;

  /* Layout */
  --hdr-h:       60px;
  --sidebar-w:   240px;
}

/* ═══════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sa);
  background: var(--bg);
  color: var(--ch);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Accessibility */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

:focus-visible {
  outline: 2px solid var(--royal);
  outline-offset: 2px;
}

/* ═══════════════════════════════════════════════════
   HEADER  .hdr
   Sticky white bar, app brand left, user controls right.
═══════════════════════════════════════════════════ */
.hdr {
  position: sticky;
  top: 0;
  z-index: 200;
  height: var(--hdr-h);
  background: var(--sf);
  border-bottom: 1px solid var(--bd);
  box-shadow: var(--shs);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 2rem;
  gap: 1rem;
}

.hdr-brand { display: flex; flex-direction: column; gap: .05rem; }

.hdr-brand h1 {
  font-family: var(--se);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.025em;
  line-height: 1.1;
}

.hdr-brand h1 .dot { color: var(--royal); }

.hdr-tagline {
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--mu);
}

.hdr-right {
  display: flex;
  align-items: center;
  gap: .75rem;
  flex-shrink: 0;
}

.hdr-user {
  font-size: .78rem;
  font-weight: 500;
  color: var(--dim);
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════
   CARD  .card
═══════════════════════════════════════════════════ */
.card {
  background: var(--sf);
  border-radius: var(--r);
  box-shadow: var(--shs);
  padding: 1rem;
}

.card-hover {
  transition: box-shadow .18s, transform .18s;
  cursor: pointer;
}

.card-hover:hover {
  box-shadow: var(--sh);
  transform: translateY(-1px);
}

/* ═══════════════════════════════════════════════════
   BUTTONS  .btn-primary  .btn-ghost
═══════════════════════════════════════════════════ */
.btn-primary,
.btn-ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .4rem;
  font-family: var(--sa);
  font-size: .82rem;
  font-weight: 700;
  padding: .55rem 1.25rem;
  border-radius: 100px;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: background .18s, border-color .18s, box-shadow .18s, transform .15s;
  white-space: nowrap;
  min-height: 36px;
  text-decoration: none;
  -webkit-user-select: none;
  user-select: none;
}

/* Primary — royal blue fill */
.btn-primary {
  background: var(--royal);
  color: #fff;
  border-color: var(--royal);
}

.btn-primary:hover:not(:disabled) {
  background: #3558c8;
  border-color: #3558c8;
  box-shadow: 0 4px 14px rgba(65,105,225,.32);
  transform: translateY(-1px);
}

.btn-primary:active:not(:disabled) { transform: none; box-shadow: none; }

.btn-primary:disabled {
  opacity: .55;
  cursor: not-allowed;
}

/* Ghost — border only */
.btn-ghost {
  background: transparent;
  color: var(--royal);
  border-color: var(--royal);
}

.btn-ghost:hover:not(:disabled) { background: var(--rs); }

.btn-ghost:disabled { opacity: .55; cursor: not-allowed; }

/* Danger ghost */
.btn-ghost-danger {
  color: var(--red);
  border-color: var(--red);
}

.btn-ghost-danger:hover:not(:disabled) { background: var(--rds); }

/* Size modifiers */
.btn-sm  { font-size: .74rem; padding: .38rem .9rem;   min-height: 30px; }
.btn-lg  { font-size: .9rem;  padding: .7rem  1.75rem; min-height: 44px; }
.btn-full { width: 100%; }

/* ═══════════════════════════════════════════════════
   FORM FIELDS  .fld
   Vertical label → input stack. Compose inside .fg grid.
═══════════════════════════════════════════════════ */
.fld {
  display: flex;
  flex-direction: column;
  gap: .28rem;
}

.fld label {
  font-size: .78rem;
  font-weight: 600;
  color: var(--ch);
  letter-spacing: .01em;
}

.fld .req { color: var(--red); }
.fld .hint { font-size: .7rem; color: var(--mu); font-weight: 400; }

.fld input,
.fld select,
.fld textarea {
  font-family: var(--sa);
  font-size: .88rem;
  font-weight: 500;
  padding: .52rem .75rem;
  border: 1.5px solid var(--bd);
  border-radius: var(--rr);
  background: var(--sf);
  color: var(--ink);
  outline: none;
  transition: border-color .18s, box-shadow .18s;
  width: 100%;
}

.fld input:focus,
.fld select:focus,
.fld textarea:focus {
  border-color: var(--royal);
  box-shadow: 0 0 0 3px var(--rs);
}

.fld input::placeholder,
.fld textarea::placeholder {
  color: var(--lt);
  font-weight: 400;
}

.fld textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.55;
}

/* Form grid — auto-fit columns */
.fg {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: .9rem;
}

.fg .fld.span2 { grid-column: 1 / -1; }

/* Inline error text below field */
.fld-error {
  font-size: .74rem;
  color: var(--red);
  display: none;
}

/* ═══════════════════════════════════════════════════
   BOTTOM SHEET  .sheet-ov  .sheet-card  .sheet-hdr
   Slides up from the bottom on mobile; centered dialog
   on screens >= 600 px.
═══════════════════════════════════════════════════ */
.sheet-ov {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.46);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  /* hidden by default — toggle .sheet-ov--open */
}

.sheet-ov--open { /* applied by JS */ }

@keyframes _sheetUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: none; }
}

.sheet-card {
  background: var(--sf);
  border-radius: 14px 14px 0 0;
  width: 100%;
  max-width: 540px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 -8px 48px rgba(0,0,0,.18);
  animation: _sheetUp .22s cubic-bezier(.4,0,.2,1);
}

@media (min-width: 600px) {
  .sheet-ov  { align-items: center; padding: 1.5rem; }
  .sheet-card { border-radius: 14px; }
}

.sheet-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .9rem 1.25rem;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
  gap: .75rem;
}

.sheet-title {
  font-family: var(--se);
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  flex: 1;
}

.sheet-meta {
  font-size: .72rem;
  font-weight: 600;
  color: var(--mu);
}

.sheet-close {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  font-size: 1.3rem;
  color: var(--dim);
  cursor: pointer;
  border-radius: 6px;
  line-height: 1;
  transition: background .15s;
  flex-shrink: 0;
}

.sheet-close:hover { background: var(--s2); color: var(--ink); }

.sheet-body {
  padding: 1rem 1.25rem 1.5rem;
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

.sheet-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .75rem 1.25rem;
  border-top: 1px solid var(--bd);
  flex-shrink: 0;
  gap: .75rem;
}

/* ═══════════════════════════════════════════════════
   STATUS BADGES  .badge-*
   Small pill labels. Use inside cards and list rows.
═══════════════════════════════════════════════════ */
.badge-red,
.badge-amber,
.badge-green,
.badge-blue,
.badge-dim {
  display: inline-flex;
  align-items: center;
  font-family: var(--sa);
  font-size: .67rem;
  font-weight: 700;
  padding: .15rem .52rem;
  border-radius: 100px;
  white-space: nowrap;
  letter-spacing: .01em;
  line-height: 1.4;
}

.badge-red   { background: var(--rds); color: var(--red);   }
.badge-amber { background: var(--as);  color: var(--amber); }
.badge-green { background: var(--gs);  color: var(--green); }
.badge-blue  { background: var(--rs);  color: var(--royal); }
.badge-dim   { background: var(--s2);  color: var(--mu);    }

/* ═══════════════════════════════════════════════════
   APP SHELL  .app-shell  .sidebar  .main-content
   Two-column layout: 240 px sidebar | flexible content.
   Below 768 px the sidebar becomes a horizontal strip
   pinned above the scrollable main content.
═══════════════════════════════════════════════════ */
.app-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: calc(100vh - var(--hdr-h));
}

.sidebar {
  background: var(--sf);
  border-right: 1px solid var(--bd);
  padding: 1.25rem 1rem;
  position: sticky;
  top: var(--hdr-h);
  height: calc(100vh - var(--hdr-h));
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  /* Custom scrollbar */
  scrollbar-width: thin;
  scrollbar-color: var(--bd) transparent;
}

.sidebar::-webkit-scrollbar       { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 4px; }

.main-content {
  min-width: 0;
  padding: 1.5rem 2rem;
}

/* Sidebar typography helpers */
.sidebar-label {
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--mu);
  margin-bottom: .5rem;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: .15rem;
}

.sidebar-nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .5rem;
  font-family: var(--sa);
  font-size: .82rem;
  font-weight: 600;
  padding: .45rem .72rem;
  border-radius: var(--rr);
  border: none;
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  transition: background .14s, color .14s;
  text-align: left;
  width: 100%;
}

.sidebar-nav-item:hover             { background: var(--s2); color: var(--ch); }
.sidebar-nav-item.active            { background: var(--rs); color: var(--royal); }
.sidebar-nav-item .nav-badge {
  font-size: .67rem;
  font-weight: 700;
  background: var(--s3);
  color: var(--mu);
  padding: .1rem .42rem;
  border-radius: 100px;
  flex-shrink: 0;
}
.sidebar-nav-item.active .nav-badge { background: var(--royal); color: #fff; }

@media (max-width: 768px) {
  .app-shell {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }

  .sidebar {
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--bd);
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    padding: .5rem .75rem;
    gap: .4rem;
    overflow-y: visible;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .sidebar::-webkit-scrollbar { display: none; }

  .sidebar-label { display: none; }

  .sidebar-nav {
    flex-direction: row;
    gap: .3rem;
    flex-wrap: nowrap;
  }

  .sidebar-nav-item {
    white-space: nowrap;
    padding: .38rem .75rem;
    font-size: .76rem;
  }

  .main-content { padding: 1rem; }
}

/* ═══════════════════════════════════════════════════
   LOGIN VIEW
   Centered card over a tinted gradient background.
   Shown when there is no active session.
═══════════════════════════════════════════════════ */
.login-view {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  background: linear-gradient(145deg, #eef2ff 0%, #f9f9fa 60%);
}

.login-card {
  background: var(--sf);
  border-radius: 16px;
  box-shadow:
    0 2px 8px  rgba(0,0,0,.05),
    0 12px 48px rgba(65,105,225,.1);
  padding: 2.25rem 2rem;
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.login-logo { display: flex; flex-direction: column; gap: .25rem; }

.login-logo h1 {
  font-family: var(--se);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.035em;
  line-height: 1.1;
}

.login-logo h1 .dot { color: var(--royal); }

.login-logo p {
  font-family: var(--se);
  font-size: .9rem;
  color: var(--dim);
  line-height: 1.45;
}

/* Inline message (success / error) */
.login-msg {
  font-size: .82rem;
  padding: .6rem .8rem;
  border-radius: var(--rr);
  line-height: 1.45;
  display: none;
}

.login-msg.success { background: var(--gs); color: var(--green); }
.login-msg.error   { background: var(--rds); color: var(--red);  }

/* ═══════════════════════════════════════════════════
   DIVIDERS & MISC
═══════════════════════════════════════════════════ */
.divider {
  border: none;
  border-top: 1px solid var(--bd);
  margin: 1rem 0;
}

.page-title {
  font-family: var(--se);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.02em;
  margin-bottom: 1rem;
}

.empty-state {
  padding: 2.5rem 1.5rem;
  text-align: center;
  border: 1.5px dashed var(--bd);
  border-radius: var(--r);
  font-family: var(--se);
  font-size: .88rem;
  color: var(--mu);
  line-height: 1.55;
}

/* ═══════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════ */
.hidden   { display: none !important; }
.dimmed   { opacity: .4; pointer-events: none; }
.mono     { font-family: 'Menlo', 'Consolas', monospace; font-size: .82em; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     LOGIN VIEW  (shown when no active session)
═══════════════════════════════════════════════════ -->
<div id="loginView" class="login-view">
  <div class="login-card">
    <div class="login-logo">
      <h1>The Present Value<span class="dot">.</span></h1>
      <p>Compliance tracking for Filipino<br>tax practitioners</p>
    </div>

    <div id="loginMsg" class="login-msg" role="alert" aria-live="polite"></div>

    <div class="fld">
      <label for="loginEmail">Email address</label>
      <input
        type="email"
        id="loginEmail"
        placeholder="you@yourfirm.com"
        autocomplete="email"
        inputmode="email"
      >
    </div>

    <button class="btn-primary btn-lg btn-full" id="loginBtn" onclick="handleLogin()">
      Send sign-in link
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     AUTHENTICATED APP SHELL
     (hidden until session confirmed)
═══════════════════════════════════════════════════ -->
<div id="appView" class="hidden">

  <!-- Sticky header -->
  <header class="hdr" role="banner">
    <div class="hdr-brand">
      <h1>The Present Value<span class="dot">.</span></h1>
      <div class="hdr-tagline">Practitioner Suite</div>
    </div>
    <div class="hdr-right">
      <span class="hdr-user" id="hdrUser"></span>
      <button class="btn-ghost btn-sm" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <!-- ── ROSTER VIEW ── -->
  <div id="rosterView" class="app-shell">
    <aside class="sidebar" role="complementary" aria-label="Roster controls">
      <!-- Populated by roster module -->
    </aside>
    <main class="main-content" id="rosterMain" role="main">
      <!-- Populated by roster module -->
    </main>
  </div>

  <!-- ── CLIENT DETAIL VIEW ── -->
  <div id="clientView" class="hidden">
    <!-- Populated by client detail module -->
  </div>

</div><!-- #appView -->


<script>
/*
 * ══════════════════════════════════════════════════════════════
 * SQL MIGRATION
 * Run once in the Supabase SQL editor before going live.
 * ══════════════════════════════════════════════════════════════
 *
 * ── 1. PRACTITIONERS ──────────────────────────────────────────
 *
 * create table if not exists practitioners (
 *   id          uuid primary key default gen_random_uuid(),
 *   auth_id     uuid unique not null
 *                 references auth.users(id) on delete cascade,
 *   email       text,
 *   name        text,
 *   firm_name   text,
 *   plan        text not null default 'pro',
 *   created_at  timestamptz not null default now()
 * );
 *
 * alter table practitioners enable row level security;
 *
 * create policy "practitioners: own row"
 *   on practitioners for all
 *   using     (auth_id = auth.uid())
 *   with check (auth_id = auth.uid());
 *
 *
 * ── 2. CLIENTS ────────────────────────────────────────────────
 *
 * create table if not exists clients (
 *   id                  uuid primary key default gen_random_uuid(),
 *   practitioner_id     uuid not null
 *                         references practitioners(id) on delete cascade,
 *   display_name        text not null,
 *   tin                 text,
 *   rdo_code            text,
 *   taxpayer_type       text,
 *     -- 'Self-Employed' | 'Corporation' | 'Mixed Income' | 'Employee'
 *   vat_status          text,
 *     -- 'VAT-Registered' | 'Non-VAT (8% Option)'
 *     -- | 'Non-VAT (Percentage Tax)' | 'Non-VAT (Graduated)'
 *   regime              text,           -- display alias for vat_status
 *   fiscal_start_month  int not null default 1,   -- 1 = January
 *   industry            text,
 *   notes               text,
 *   is_active           boolean not null default true,
 *   created_at          timestamptz not null default now(),
 *   updated_at          timestamptz not null default now()
 * );
 *
 * alter table clients enable row level security;
 *
 * create policy "clients: own practitioner"
 *   on clients for all
 *   using (
 *     practitioner_id in (
 *       select id from practitioners where auth_id = auth.uid()
 *     )
 *   )
 *   with check (
 *     practitioner_id in (
 *       select id from practitioners where auth_id = auth.uid()
 *     )
 *   );
 *
 *
 * ── 3. COMPLIANCE RECORDS ─────────────────────────────────────
 *
 * create table if not exists compliance_records (
 *   id                uuid primary key default gen_random_uuid(),
 *   client_id         uuid not null
 *                       references clients(id) on delete cascade,
 *   obligation_id     text,          -- e.g. '2025-2550M-jan'
 *   form              text,          -- e.g. 'BIR Form 2550M'
 *   period            text,          -- e.g. 'January 2025 VAT'
 *   due_date          date,
 *
 *   -- Step 1: Filing
 *   filed_date        date,
 *   filing_reference  text,          -- eBIRForms confirmation no.
 *
 *   -- Step 2: TRRC
 *   trrc_saved        boolean not null default false,
 *   trrc_date         date,
 *   trrc_reference    text,
 *
 *   -- Step 3: Payment
 *   has_tax_due       boolean not null default false,
 *   tax_due           numeric(12,2),
 *   payment_status    text not null default 'n/a',
 *     -- 'n/a' | 'unpaid' | 'paid'
 *   amount_paid       numeric(12,2),
 *   payment_date      date,
 *   payment_reference text,
 *   payment_mode      text,
 *     -- 'eFPS' | 'GCash' | 'Bank (AAB)' | 'Over-the-counter (RDO)'
 *
 *   notes             text,
 *   created_at        timestamptz not null default now(),
 *   updated_at        timestamptz not null default now()
 * );
 *
 * alter table compliance_records enable row level security;
 *
 * create policy "records: own clients"
 *   on compliance_records for all
 *   using (
 *     client_id in (
 *       select c.id from clients c
 *       join practitioners p on p.id = c.practitioner_id
 *       where p.auth_id = auth.uid()
 *     )
 *   )
 *   with check (
 *     client_id in (
 *       select c.id from clients c
 *       join practitioners p on p.id = c.practitioner_id
 *       where p.auth_id = auth.uid()
 *     )
 *   );
 *
 *
 * ── 4. TRIGGERS  (auto-update updated_at) ────────────────────
 *
 * create or replace function _touch_updated_at()
 * returns trigger language plpgsql as $$
 * begin
 *   new.updated_at = now();
 *   return new;
 * end;
 * $$;
 *
 * create trigger clients_updated_at
 *   before update on clients
 *   for each row execute function _touch_updated_at();
 *
 * create trigger records_updated_at
 *   before update on compliance_records
 *   for each row execute function _touch_updated_at();
 *
 * ══════════════════════════════════════════════════════════════
 */


// ── SUPABASE ──────────────────────────────────────────────────
const SUPA_URL = 'YOUR_URL'
const SUPA_KEY = 'YOUR_ANON_KEY'
const supa = supabase.createClient(SUPA_URL, SUPA_KEY)


// ── GLOBALS ───────────────────────────────────────────────────
let currentPractitioner = null
let activeClientId      = null


// ── HELPERS ───────────────────────────────────────────────────
const $  = id  => document.getElementById(id)
const qs = sel => document.querySelector(sel)

/** Escape a string for safe HTML insertion */
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}


// ── VIEW SWITCHER ─────────────────────────────────────────────
function showLoginView() {
  $('loginView').classList.remove('hidden')
  $('appView').classList.add('hidden')
}

function showRosterView() {
  $('loginView').classList.add('hidden')
  $('appView').classList.remove('hidden')
  $('rosterView').classList.remove('hidden')
  $('clientView').classList.add('hidden')
  activeClientId = null
}

function showClientDetail(clientId) {
  activeClientId = clientId
  $('loginView').classList.add('hidden')
  $('appView').classList.remove('hidden')
  $('rosterView').classList.add('hidden')
  $('clientView').classList.remove('hidden')
}


// ── AUTH ──────────────────────────────────────────────────────
/**
 * Returns the practitioners row for the current user,
 * creating one automatically on first login.
 */
async function getCurrentPractitioner() {
  const { data: { user } } = await supa.auth.getUser()
  if (!user) return null

  const { data: existing } = await supa
    .from('practitioners')
    .select('*')
    .eq('auth_id', user.id)
    .maybeSingle()

  if (existing) return existing

  const { data: created, error } = await supa
    .from('practitioners')
    .insert({ auth_id: user.id, email: user.email })
    .select()
    .single()

  if (error) { console.error('Could not create practitioner row:', error); return null }
  return created
}

/** Send a magic-link OTP to the entered email address */
async function handleLogin() {
  const email = ($('loginEmail').value ?? '').trim()
  const btn   = $('loginBtn')
  const msg   = $('loginMsg')

  if (!email) { _setLoginMsg('Please enter your email address.', 'error'); return }

  btn.disabled    = true
  btn.textContent = 'Sending…'
  _setLoginMsg('', '')

  const { error } = await supa.auth.signInWithOtp({ email })

  btn.disabled    = false
  btn.textContent = 'Send sign-in link'

  if (error) {
    _setLoginMsg(error.message || 'Something went wrong. Please try again.', 'error')
  } else {
    _setLoginMsg(`Link sent to ${email} — check your inbox.`, 'success')
    $('loginEmail').value = ''
  }
}

function _setLoginMsg(text, type) {
  const el = $('loginMsg')
  el.textContent   = text
  el.className     = 'login-msg' + (type ? ' ' + type : '')
  el.style.display = text ? 'block' : 'none'
}

/** Sign the current user out */
async function signOut() {
  await supa.auth.signOut()
  // onAuthStateChange fires and calls showLoginView()
}

/** Called whenever the Supabase auth state changes */
async function _onSessionChange(session) {
  if (session) {
    currentPractitioner = await getCurrentPractitioner()

    // Populate header user indicator
    const hdrUser = $('hdrUser')
    if (hdrUser && currentPractitioner) {
      hdrUser.textContent =
        currentPractitioner.firm_name ||
        currentPractitioner.name      ||
        currentPractitioner.email     || ''
    }

    showRosterView()
    // Roster content is populated by the roster module (loaded later)
  } else {
    currentPractitioner = null
    activeClientId      = null
    showLoginView()
  }
}


// ── BOOT ──────────────────────────────────────────────────────
// Listen for future sign-in / sign-out events
supa.auth.onAuthStateChange((_event, session) => {
  _onSessionChange(session)
})

// Check whether there is already an active session on page load
supa.auth.getSession().then(({ data: { session } }) => {
  _onSessionChange(session)
})

// Allow Enter key to submit the login form
$('loginEmail').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin()
})
</script>
